name: PR Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pr-gate:
    name: PR Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Run tests
        run: npm run test
